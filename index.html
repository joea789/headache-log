<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headache Pro Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background: #121212; color: #e0e0e0; margin: 0; }
        .main-container { padding: 15px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #bb86fc; }
        label { display: block; margin: 10px 0 5px; font-size: 0.9em; color: #b0b0b0; }
        input, textarea, button { width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; }
        
        .slider-group { background: #2c2c2c; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.85em; color: #03dac6; margin-bottom: 5px; }
        input[type=range] { width: 100%; height: 8px; background: #444; border-radius: 5px; outline: none; margin-bottom: 20px; -webkit-appearance: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #03dac6; border-radius: 50%; cursor: pointer; }

        #end-date-display { background: #2c2c2c; padding: 10px; border-radius: 8px; border-left: 4px solid #03dac6; margin-bottom: 15px; font-size: 0.9em; }
        #end-date-val { color: #03dac6; font-weight: bold; }

        button { background: #03dac6; color: #000; border: none; font-weight: bold; cursor: pointer; padding: 15px; }
        button.secondary { background: #bb86fc; margin-top: 5px; }
        button.danger { background: #cf6679; color: white; margin-top: 10px; }
        
        .table-container { overflow-x: auto; max-height: 400px; overflow-y: auto; background: #1e1e1e; border-radius: 8px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #333; }
        th { background: #2c2c2c; position: sticky; top: 0; color: #bb86fc; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .view-box { white-space: pre-wrap; background: #2c2c2c; padding: 15px; border-radius: 8px; border: 1px solid #444; line-height: 1.6; color: #fff; margin-bottom: 20px; font-size: 1.1em; }
        .meta-info { color: #bb86fc; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="card">
            <h2>New Log</h2>
            <label>Start Date & Time</label>
            <input type="datetime-local" id="startDateTime" oninput="calculateEndDate()">

            <div class="slider-group">
                <div class="slider-label"><span>Days:</span> <b id="daysVal">0</b></div>
                <input type="range" id="sliderDays" min="0" max="14" value="0" oninput="calculateEndDate()">
                
                <div class="slider-label"><span>Hours:</span> <b id="hoursVal">0</b></div>
                <input type="range" id="sliderHours" min="0" max="23" value="0" oninput="calculateEndDate()">
                
                <div style="font-size: 0.8em; color: #888;">Total: <span id="totalDurationDisplay">0</span> days</div>
            </div>

            <div id="end-date-display">
                Calculated End: <span id="end-date-val">--</span>
            </div>

            <label>Notes & Triggers</label>
            <textarea id="notes" rows="3" placeholder="Leave blank if none..."></textarea>

            <button onclick="saveLog()">Save Entry</button>
            <button class="secondary" onclick="emailResults()">Email Results</button>
        </div>

        <h3>History</h3>
        <div class="table-container">
            <table>
                <thead><tr><th>Start</th><th>Days</th><th>Notes</th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <!-- VIEW & ACTION OVERLAY -->
    <div id="viewOverlay" class="overlay">
        <div class="card">
            <h2 id="viewHeader">Entry Details</h2>
            <div class="meta-info" id="viewDate"></div>
            <div class="meta-info" id="viewDuration"></div>
            
            <div id="readMode">
                <label>Notes:</label>
                <div class="view-box" id="viewNotes"></div>
                <button onclick="switchToEdit()">Edit Notes</button>
                <button class="danger" onclick="deleteEntry()">Delete Entry</button>
            </div>

            <div id="editMode" style="display:none;">
                <label>Edit Notes:</label>
                <textarea id="editNotesField" rows="8"></textarea>
                <button onclick="updateEntry()">Save Changes</button>
                <button onclick="switchToRead()" style="background: transparent; color: #888; border: 1px solid #333;">Cancel</button>
            </div>

            <button class="secondary" onclick="closeOverlay()" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <script>
        let activeEntryId = null;

        window.onload = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            document.getElementById('startDateTime').value = `${year}-${month}-${day}T10:00`;
            renderTable();
            calculateEndDate();
        };

        function calculateEndDate() {
            const startVal = document.getElementById('startDateTime').value;
            const days = parseInt(document.getElementById('sliderDays').value);
            const hours = parseInt(document.getElementById('sliderHours').value);
            document.getElementById('daysVal').innerText = days;
            document.getElementById('hoursVal').innerText = hours;
            const totalDecimalDays = (days + (hours / 24)).toFixed(2);
            document.getElementById('totalDurationDisplay').innerText = totalDecimalDays;

            const display = document.getElementById('end-date-val');
            if (startVal) {
                const startDate = new Date(startVal);
                const durationMs = totalDecimalDays * 86400000;
                const endDate = new Date(startDate.getTime() + durationMs);
                display.innerText = endDate.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            }
        }

        function saveLog() {
            const days = parseInt(document.getElementById('sliderDays').value);
            const hours = parseInt(document.getElementById('sliderHours').value);
            const totalDecimalDays = (days + (hours / 24)).toFixed(2);
            const entry = {
                id: Date.now(),
                start: document.getElementById('startDateTime').value,
                duration: totalDecimalDays,
                notes: document.getElementById('notes').value || ""
            };
            const logs = JSON.parse(localStorage.getItem('headache_logs') || '[]');
            logs.push(entry);
            localStorage.setItem('headache_logs', JSON.stringify(logs));
            document.getElementById('notes').value = "";
            document.getElementById('sliderDays').value = 0;
            document.getElementById('sliderHours').value = 0;
            renderTable();
            calculateEndDate();
            alert("Log saved!");
        }

        function renderTable() {
            let logs = JSON.parse(localStorage.getItem('headache_logs') || '[]');
            logs.sort((a, b) => new Date(b.start) - new Date(a.start));
            const tbody = document.getElementById('logBody');
            tbody.innerHTML = logs.map(log => `
                <tr onclick="openView(${log.id})">
                    <td>${log.start.replace('T', ' ')}</td>
                    <td>${log.duration}</td>
                    <td style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;">${log.notes}</td>
                </tr>
            `).join('');
        }

        function openView(id) {
            const logs = JSON.parse(localStorage.getItem('headache_logs') || '[]');
            const entry = logs.find(l => l.id === id);
            if (entry) {
                activeEntryId = id;
                document.getElementById('viewDate').innerText = "Started: " + entry.start.replace('T', ' ');
                document.getElementById('viewDuration').innerText = "Duration: " + entry.duration + " days";
                document.getElementById('viewNotes').innerText = entry.notes;
                document.getElementById('editNotesField').value = entry.notes;
                switchToRead();
                document.getElementById('viewOverlay').style.display = 'block';
            }
        }

        function switchToEdit() {
            document.getElementById('viewHeader').innerText = "Edit Notes";
            document.getElementById('readMode').style.display = 'none';
            document.getElementById('editMode').style.display = 'block';
        }

        function switchToRead() {
            document.getElementById('viewHeader').innerText = "Entry Details";
            document.getElementById('readMode').style.display = 'block';
            document.getElementById('editMode').style.display = 'none';
        }

        function closeOverlay() {
            document.getElementById('viewOverlay').style.display = 'none';
            activeEntryId = null;
        }

        function updateEntry() {
            let logs = JSON.parse(localStorage.getItem('headache_logs') || '[]');
            const index = logs.findIndex(l => l.id === activeEntryId);
            if (index !== -1) {
                logs[index].notes = document.getElementById('editNotesField').value;
                localStorage.setItem('headache_logs', JSON.stringify(logs));
                renderTable();
                document.getElementById('viewNotes').innerText = logs[index].notes;
                switchToRead();
            }
        }

        function deleteEntry() {
            if (confirm("Delete this log permanently?")) {
                let logs = JSON.parse(localStorage.getItem('headache_logs') || '[]');
                logs = logs.filter(l => l.id !== activeEntryId);
                localStorage.setItem('headache_logs', JSON.stringify(logs));
                renderTable();
                closeOverlay();
            }
        }

        function emailResults() {
            const logs = JSON.parse(localStorage.getItem('headache_logs') || '[]');
            if (logs.length === 0) return alert("Nothing to export.");
            
            logs.sort((a, b) => new Date(b.start) - new Date(a.start));

            let header = "Mary Aiello Pain log%0D%0A";
            header += "--------------------------------------------------%0D%0A";
            header += "DATE & TIME          | DAYS | NOTES%0D%0A";
            header += "--------------------------------------------------%0D%0A";

            let rows = "";
            logs.forEach(log => {
                const datePart = log.start.replace('T', ' ').padEnd(20, ' ');
                const durationPart = log.duration.toString().padEnd(4, ' ');
                const notesPart = log.notes || "";
                rows += `${datePart} | ${durationPart} | ${notesPart}%0D%0A`;
            });

            let fullBody = "%0D%0A%0D%0A" + header + rows;
            const MAX_LEN = 2000;
            const SAFETY_BUFFER = 50;

            if (fullBody.length > MAX_LEN) {
                const overflow = fullBody.length - MAX_LEN;
                const totalTrim = overflow + SAFETY_BUFFER;
                
                const proceed = confirm(
                    `The history is too long for an email link (${fullBody.length} characters).\n\n` +
                    `To fix this, I need to trim approximately ${totalTrim} characters from the end (the oldest entries).\n\n` +
                    `Would you like to trim and proceed?`
                );

                if (proceed) {
                    fullBody = fullBody.substring(0, fullBody.length - totalTrim) + "%0D%0A... [History Truncated Due to Length]";
                } else {
                    return; 
                }
            }

            window.location.href = `mailto:?subject=Mary Aiello Pain Log Export&body=${fullBody}`;
        }
    </script>
</body>
</html>
